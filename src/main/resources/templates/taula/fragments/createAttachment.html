<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ca">
<head>
    <meta charset="UTF-8"/>
    <title th:text="${title}">Crear Adjunt</title>
</head>
<body>

<div th:fragment="list(page, url)">
    <div class="ibox">
        <div class="ibox-title d-flex align-items-center" style="padding: 10px 20px;">
            <h5 class="mr-auto" th:text="${isEdit != null && isEdit ? 'Edició adjunt codi: ' + attachment.code : 'Nou adjunt'}">Nou adjunt</h5>
            <div class="mx-0 pt-2 pb-2">
                <a th:href="@{/attachments}" class="btn btn-default btn-sm">
                    <i class="fa fa-ban"></i> Cancel·lar
                </a>
                <button th:if="${isEdit != null && isEdit && attachment.id != null}"
                        type="button"
                        class="btn btn-danger btn-sm ml-2"
                        th:onclick="'deleteAttachment(' + ${attachment.id} + ')'">
                    <i class="fa fa-trash"></i> Eliminar
                </button>
                <button class="btn btn-primary btn-sm ml-sm-2" type="submit" form="attachmentForm" id="saveButton">
                    <i class="fa fa-save"></i>
                    <span th:text="${isEdit != null && isEdit ? 'Actualitzar' : 'Desar'}">Desar</span>
                </button>

            </div>
        </div>
        <div class="ibox-content">
            <form id="attachmentForm">

                <input th:if="${isEdit != null && isEdit}" type="hidden" name="id"
                       th:value="${attachment.id}">

                <div class="form-group row">
                    <label class="col-lg-2 col-md-3 col-sm-4 col-12 col-form-label" for="codeInput">Codi:</label>
                    <div class="col-lg-10 col-md-9 col-sm-8 col-12">
                        <input type="text"
                               class="form-control"
                               id="codeInput"
                               name="code"
                               placeholder="Introdueix el codi..."
                               th:value="${attachment != null ? attachment.code : ''}"
                               required
                               oninvalid="this.setCustomValidity('Cal introduir el codi de l\'adjunt.')"
                               oninput="setCustomValidity('')">
                    </div>
                </div>

                <div class="hr-line-dashed"></div>

                <div class="form-group row">
                    <label class="col-lg-2 col-md-3 col-sm-4 col-12 col-form-label" for="nameInput">Nom adjunt:</label>
                    <div class="col-lg-10 col-md-9 col-sm-8 col-12">
                        <input type="text"
                               class="form-control"
                               id="nameInput"
                               name="name"
                               placeholder="Introdueix el nom..."
                               th:value="${attachment != null ? attachment.name : ''}"
                               required
                               oninvalid="this.setCustomValidity('Cal introduir el nom de l\'adjunt.')"
                               oninput="setCustomValidity('')">
                    </div>
                </div>

                <div class="hr-line-dashed"></div>

                <div class="form-group row">
                    <label class="col-lg-2 col-md-3 col-sm-4 col-12 col-form-label">Seleccionar
                        fitxer:</label>
                    <div class="col-lg-10 col-md-9 col-sm-8 col-12">
                        <div class="custom-file">
                            <input type="file"
                                   class="custom-file-input"
                                   id="fileInput"
                                   name="file"
                                   th:required="${isEdit == null || !isEdit}"
                                   oninvalid="this.setCustomValidity('Cal seleccionar un arxiu.')"
                                   oninput="setCustomValidity('')">
                            <label class="custom-file-label" for="fileInput">
                    <span th:text="${attachment != null && attachment.fileName != null ? attachment.fileName : 'Cap arxiu seleccionat'}">
                        Cap arxiu seleccionat
                    </span>
                            </label>
                        </div>
                    </div>
                </div>
            </form>
        </div>
    </div>


    <script th:src="@{/scripts/createAttachment.js}"></script>
</div>

<div th:fragment="footer(txt)">
    <footer th:text="${txt}"></footer>
</div>

</body>
</html>
