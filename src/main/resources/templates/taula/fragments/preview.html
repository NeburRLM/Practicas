<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      lang="ca">
<head>
    <title th:text="${title}">MA3 - The Future</title>
    <meta charset="UTF-8"/>
</head>

<body>

<!-- ===== HEADER ===== -->
<div th:fragment="header(titol)">
    <div class="d-flex justify-content-end align-items-center">
        <!--<h2 th:text="${titol}">Vista previa plantilla</h2>-->
        <div>
            <button type="button" class="btn btn-sm btn-primary" onclick="generatePdf()">
                <i class="fa fa-file-pdf-o"></i> Generar PDF
            </button>
            <a th:href="@{/template/edit/{id}(id=${template.id})}"
               class="btn btn-sm btn-success"
               title="Editar">
                <i class="fa fa-pencil"></i> Editar
            </a>
        </div>
    </div>
</div>

<div th:fragment="list(page, url)">
    <div class="wrapper wrapper-content animated fadeInRight">
        <div class="row">
            <!-- Columna izquierda: PDF Preview -->
            <div class="col-lg-8">
                <div class="ibox">
                    <div class="ibox-title">
                        <h5><i class="fa fa-file-text-o"></i> Previsualització PDF</h5>

                    </div>
                    <div class="ibox-content p-0">
                        <div th:if="${template.pageDimensions}"
                             class="bg-light p-3"
                             id="pdfViewerContainer"
                             style="height: calc(100vh - 140px); min-height: 920px; overflow-y: auto; overflow-x: auto;">

                            <!-- Página inicial vacía -->
                            <div class="bg-white shadow-sm mx-auto mb-4 position-relative"
                                 style="width: 210mm; height: 297mm; border: 1px solid #e7eaec;">
                                <div class="d-flex flex-column align-items-center justify-content-center h-100 text-muted">
                                    <i class="fa fa-file-text-o mb-3" style="font-size: 5rem; opacity: 0.3;"></i>
                                    <span>Genera una prova per veure la previsualització</span>
                                </div>
                            </div>
                        </div>
                        <div class="alert alert-warning m-3" th:if="${template.pageDimensions == null}">
                            <i class="fa fa-exclamation-triangle"></i>
                            No s'han definit les dimensions de pàgina
                        </div>
                    </div>
                </div>
            </div>

            <!-- Columna derecha: Variables -->
            <div class="col-lg-4">
                <div class="ibox">
                    <div class="ibox-title">
                        <h5><i class="fa fa-list-alt"></i> Variables de la plantilla</h5>
                        <div class="ibox-tools">
                        </div>
                    </div>
                    <div class="ibox-content p-0">

                        <!-- Tabla de variables -->
                        <div style="max-height: calc(100vh - 380px); overflow-y: auto;">
                            <table class="table table-hover mb-0">
                                <thead class="bg-light border-bottom">
                                <tr>
                                    <th class="border-0 py-3 px-3 text-uppercase small font-weight-bold text-muted">Variable</th>
                                    <th class="border-0 py-3 px-3 text-uppercase small font-weight-bold text-muted text-center">Tipus</th>
                                    <th class="border-0 py-3 px-3 text-uppercase small font-weight-bold text-muted">Valor</th>
                                </tr>
                                </thead>
                                <tbody>
                                <th:block th:if="${template != null and template.variables != null}">
                                    <tr th:each="variable : ${template.variables}">
                                        <td class="align-middle border-0 py-3 px-3">
                                            <div class="font-weight-bold text-dark text-truncate"
                                                 style="max-width: 120px;"
                                                 th:text="${variable.name}"
                                                 th:title="${variable.name}">
                                                Variable Name
                                            </div>
                                        </td>
                                        <td class="align-middle border-0 py-3 px-3 text-center">
                                                <span class="badge badge-primary px-2 py-1 text-uppercase"
                                                      style="font-size: 10px;"
                                                      th:text="${typeMap[variable.type]}">
                                                    Type
                                                </span>
                                        </td>
                                        <td class="align-middle border-0 py-3 px-3">
                                            <input type="text"
                                                   class="form-control form-control-sm variable-input"
                                                   th:attr="data-variable-id=${variable.id},
                                                                    data-variable-name=${variable.name},
                                                                    data-variable-type=${variable.type}"
                                                   th:value="${defaultValues[variable.type]}"
                                                   placeholder="Valor..."
                                                   autocomplete="off">
                                        </td>
                                    </tr>
                                </th:block>

                                <th:block th:unless="${template != null and template.variables != null and !template.variables.isEmpty()}">
                                    <tr>
                                        <td colspan="3" class="text-center text-muted border-0 py-5">
                                            <i class="fa fa-inbox d-block mb-3" style="font-size: 3rem; opacity: 0.2;"></i>
                                            <span class="small">No hi ha variables definides</span>
                                        </td>
                                    </tr>
                                </th:block>
                                </tbody>
                            </table>
                        </div>

                        <!-- Sección de importar valores -->
                        <div class="border-top p-3">
                            <div class="mb-3">
                                <label class="btn btn-outline-secondary btn-sm mb-0">
                                    <i class="fa fa-folder-open"></i> Triar arxiu JSON
                                    <input type="file"
                                           id="fileInputValors"
                                           class="d-none"
                                           accept=".json"
                                           onchange="updateFileLabel(this)">
                                </label>
                                <span class="ml-2 small text-muted" id="fileName">Cap arxiu seleccionat</span>
                            </div>

                            <button type="button"
                                    class="btn btn-success btn-sm btn-block"
                                    onclick="importValors()">
                                <i class="fa fa-upload"></i> Importar Valors
                            </button>
                        </div>

                        <!-- Botón generar prova -->
                        <div class="p-3 pt-0">
                            <button type="button"
                                    class="btn btn-primary btn-block"
                                    onclick="generateProva()">
                                <i class="fa fa-play"></i> Generar Prova
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- JavaScript -->
    <script th:inline="javascript">
        let processedTemplate = null;

        document.addEventListener("DOMContentLoaded", () => {
            window.currentTemplate = /*[[${template}]]*/ null;
            window.currentTemplateId = /*[[${plantillaId}]]*/ null;
        });

        window.addEventListener('resize', () => {
            if (processedTemplate && processedTemplate.boxes && processedTemplate.boxes.length > 0) {
                let htmlContent = '';
                processedTemplate.boxes.forEach(box => {
                    if (box.innerHtml) {
                        const textarea = document.createElement('textarea');
                        textarea.innerHTML = box.innerHtml;
                        const decodedHtml = textarea.value;
                        htmlContent += decodedHtml;
                    }
                });
                paginateContent(htmlContent, document.getElementById('pdfViewerContainer'));
            }
        });

        function generateProva() {
            let template = JSON.parse(JSON.stringify(window.currentTemplate));

            // Actualizar los valores de las variables
            let hasEmptyFields = false;
            document.querySelectorAll('.variable-input').forEach(input => {
                const variableId = input.getAttribute('data-variable-id');
                const value = input.value.trim();

                if (!value) {
                    input.classList.add('is-invalid');
                    hasEmptyFields = true;
                } else {
                    input.classList.remove('is-invalid');
                    const variable = template.variables.find(v => v.id == variableId);
                    if (variable) {
                        variable.value = value;
                    }
                }
            });

            if (hasEmptyFields) {
                alert('Cal omplir tots els valors de les variables abans de generar la prova.');
                return;
            }

            // Mostrar loading
            const viewerContainer = document.getElementById('pdfViewerContainer');
            viewerContainer.innerHTML = `
                <div class="bg-white shadow-sm mx-auto mb-4 position-relative"
                     style="width: 210mm; height: 297mm; border: 1px solid #e7eaec;">
                    <div class="d-flex flex-column align-items-center justify-content-center h-100 text-success">
                        <i class="fa fa-spinner fa-spin mb-3" style="font-size: 5rem;"></i>
                        <span>Generant prova...</span>
                    </div>
                </div>
            `;

            // Enviar al endpoint /process-template
            fetch('/plantilles-web/template/process-template', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(template)
            })
                .then(response => response.json())
                .then(data => {
                    if (data && data.item) {
                        processedTemplate = data.item;
                        console.log('Prova procesada:', processedTemplate);
                        renderProcessedTemplate(data.item);
                    }
                })
                .catch(error => {
                    console.error('Error:', error);
                    alert('Error generant la prova');
                    viewerContainer.innerHTML = `
                        <div class="bg-white shadow-sm mx-auto mb-4 position-relative"
                             style="width: 210mm; height: 297mm; border: 1px solid #e7eaec;">
                            <div class="d-flex flex-column align-items-center justify-content-center h-100 text-danger">
                                <i class="fa fa-exclamation-triangle mb-3" style="font-size: 5rem;"></i>
                                <span>Error generant la prova</span>
                            </div>
                        </div>
                    `;
                });
        }

        function loadCSS(styleId) {
            if (!styleId) return Promise.resolve();

            const existingStyle = document.getElementById('template-style');
            if (existingStyle) {
                existingStyle.remove();
            }

            return fetch(`/plantilles-web/template/styles/css/${styleId}`)
                .then(response => {
                    if (!response.ok) {
                        throw new Error(`HTTP error! status: ${response.status}`);
                    }
                    return response.text();
                })
                .then(cssText => {
                    const scopedCSS = scopeCSSToSelector(cssText, '.a4-content');

                    const style = document.createElement('style');
                    style.id = 'template-style';
                    style.textContent = scopedCSS;
                    document.head.appendChild(style);

                    console.log('Estilos cargados y aplicados');
                })
                .catch(error => {
                    console.error('Error cargando estilos:', error);
                });
        }

        function scopeCSSToSelector(css, selector) {
            const rules = css.split('}');
            const scopedRules = [];

            rules.forEach(rule => {
                const trimmedRule = rule.trim();
                if (!trimmedRule) return;

                const declarationStart = trimmedRule.indexOf('{');
                if (declarationStart === -1) return;

                const selectorsText = trimmedRule.substring(0, declarationStart).trim();
                const declarations = trimmedRule.substring(declarationStart);

                const selectors = selectorsText.split(',').map(s => s.trim());

                const scopedSelectors = selectors.map(sel => {
                    if (sel.startsWith('@')) {
                        return sel;
                    }
                    if (sel.includes(selector)) {
                        return sel;
                    }
                    return `${selector} ${sel}`;
                }).join(', ');

                scopedRules.push(`${scopedSelectors} ${declarations}}`);
            });

            return scopedRules.join('\n');
        }

        function renderProcessedTemplate(processedTemplate) {
            const viewerContainer = document.getElementById('pdfViewerContainer');

            if (processedTemplate.boxes && processedTemplate.boxes.length > 0) {
                let htmlContent = '';
                processedTemplate.boxes.forEach(box => {
                    if (box.innerHtml) {
                        const textarea = document.createElement('textarea');
                        textarea.innerHTML = box.innerHtml;
                        const decodedHtml = textarea.value;
                        htmlContent += decodedHtml;
                    }
                });

                // Dividir contenido en páginas A4
                paginateContent(htmlContent, viewerContainer);

                if (processedTemplate.style) {
                    loadCSS(processedTemplate.style);
                }
            } else {
                viewerContainer.innerHTML = `
                    <div class="bg-white shadow-sm mx-auto mb-4 position-relative"
                         style="width: 210mm; height: 297mm; border: 1px solid #e7eaec;">
                        <div class="d-flex flex-column align-items-center justify-content-center h-100 text-muted">
                            <i class="fa fa-file-text-o mb-3" style="font-size: 5rem; opacity: 0.3;"></i>
                            <span>No hi ha contingut per mostrar</span>
                        </div>
                    </div>
                `;
            }
        }

        function paginateContent(htmlContent, container) {
            // Calcular escala responsive
            const containerWidth = container.clientWidth - 40; // Restar padding
            const a4Width = 794; // 210mm en px a 96 DPI
            const scale = Math.min(1, containerWidth / a4Width);
            const scaledWidth = a4Width * scale;
            const scaledHeight = 1123 * scale; // 297mm en px a 96 DPI

            container.innerHTML = `
        <div class="bg-white shadow-sm mx-auto mb-4 position-relative"
             style="width: ${scaledWidth}px; min-height: ${scaledHeight}px; border: 1px solid #e7eaec; transform-origin: top center;">
            <div class="a4-content" style="padding: ${18 * scale}mm ${14 * scale}mm; width: 100%; box-sizing: border-box; transform: scale(${scale}); transform-origin: top left;">
                ${htmlContent}
            </div>
        </div>
    `;

            container.scrollTop = 0;
        }

        function updateFileLabel(input) {
            const fileName = input.files[0]?.name || 'Cap arxiu seleccionat';
            document.getElementById('fileName').textContent = fileName;
        }

        function importValors() {
            const fileInput = document.getElementById('fileInputValors');
            const file = fileInput.files[0];

            if (!file) {
                alert('Cal especificar el fitxer que conté els valors');
                return;
            }

            const reader = new FileReader();
            reader.onload = function (e) {
                try {
                    const jsonData = JSON.parse(e.target.result);
                    const valorsData = jsonData.items || jsonData;

                    let importedCount = 0;
                    Object.keys(valorsData).forEach(variableName => {
                        const input = document.querySelector(`input[data-variable-name="${variableName}"]`);
                        if (input) {
                            input.value = valorsData[variableName];
                            input.classList.remove('is-invalid');
                            importedCount++;
                        }
                    });

                    alert(`S'han importat ${importedCount} valors correctament`);
                } catch (error) {
                    console.error('Error parsing JSON:', error);
                    alert('El fitxer no conté un JSON vàlid');
                }
            };
            reader.readAsText(file);
        }

        function generatePdf() {
            if (!processedTemplate) {
                alert('No hi ha template processat per generar el PDF');
                return;
            }

            const templateId = /*[[${plantillaId}]]*/ null;
            const viewerContainer = document.getElementById('pdfViewerContainer');
            const iboxTitle = document.querySelector('.ibox-title');

            // Mostrar indicador de carga
            viewerContainer.innerHTML = `
        <div class="bg-white shadow-sm mx-auto mb-4 position-relative"
             style="width: 210mm; height: 297mm; border: 1px solid #e7eaec;">
            <div class="d-flex flex-column align-items-center justify-content-center h-100 text-success">
                <i class="fa fa-spinner fa-spin mb-3" style="font-size: 5rem;"></i>
                <span>Generant PDF...</span>
            </div>
        </div>
    `;

            fetch(`/plantilles-web/template/getPdfPreview/${templateId}`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(processedTemplate)
            })
                .then(response => {
                    if (!response.ok) {
                        throw new Error('Error generando PDF');
                    }
                    return response.blob();
                })
                .then(blob => {
                    const url = window.URL.createObjectURL(blob);
                    viewerContainer.style.overflow = 'hidden';
                    // Añadir botón de descarga al ibox-title
                    const downloadBtn = document.createElement('div');
                    downloadBtn.className = 'pull-right';
                    downloadBtn.innerHTML = `
            <button class="btn btn-sm btn-default" onclick="downloadPdf('${url}', '${processedTemplate.name || 'document'}')">
                <i class="fa fa-download"></i>
            </button>
        `;
                    iboxTitle.appendChild(downloadBtn);

                    // Mostrar PDF con zoom reducido
                    viewerContainer.innerHTML = `
            <div class="bg-white shadow-sm mx-auto mb-4 position-relative"
                 style="width: 210mm; height: 297mm; border: 1px solid #e7eaec;">
                <object data="${url}#zoom=85" type="application/pdf" width="100%" height="100%" style="min-height: 297mm;">
                    <iframe src="${url}#zoom=85" width="100%" height="100%" style="border: none; min-height: 297mm;">
                        <p>Tu navegador no soporta visualización de PDF.</p>
                    </iframe>
                </object>
            </div>
        `;
                })
                .catch(error => {
                    console.error('Error:', error);
                    alert('Error generant el PDF');
                    viewerContainer.innerHTML = `
            <div class="bg-white shadow-sm mx-auto mb-4 position-relative"
                 style="width: 210mm; height: 297mm; border: 1px solid #e7eaec;">
                <div class="d-flex flex-column align-items-center justify-content-center h-100 text-danger">
                    <i class="fa fa-exclamation-triangle mb-3" style="font-size: 5rem;"></i>
                    <span>Error generant el PDF</span>
                </div>
            </div>
        `;
                });
        }

        // Función auxiliar para descargar el PDF
        function downloadPdf(url, filename) {
            const a = document.createElement('a');
            a.href = url;
            a.download = filename + '.pdf';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
        }
    </script>
</div>

<!-- ===== FOOTER ===== -->
<div th:fragment="footer(txt)">
    <footer class="text-center text-muted mt-4" th:text="${txt}">
    </footer>
</div>

</body>
</html>
