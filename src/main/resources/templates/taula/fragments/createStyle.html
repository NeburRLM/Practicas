<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>

<div th:fragment="header(titol)">
    <div class="row wrapper border-bottom white-bg page-heading">
        <div class="col-lg-10">
            <h2 th:text="${titol}">Crear estil</h2>
        </div>
    </div>
</div>

<div th:fragment="list(page, url)">
    <div class="wrapper wrapper-content animated fadeInRight">
        <div class="row">
            <div class="col-lg-12">
                <div class="ibox">
                    <div class="ibox-title">
                        <h5>Nou estil</h5>
                    </div>
                    <div class="ibox-content">
                        <form th:action="@{${isEdit != null && isEdit ? '/template/styles/update' : '/template/styles/save'}}" method="post">
                            <input th:if="${isEdit != null && isEdit}" type="hidden" name="id" th:value="${style.id}">
                            <div class="form-group row">
                                <label class="col-sm-2 col-form-label">Codi:</label>
                                <div class="col-sm-10">
                                    <input type="text"
                                           class="form-control"
                                           name="code"
                                           th:value="${style != null ? style.code : ''}"
                                           required
                                           oninvalid="this.setCustomValidity('Cal introduir el codi de l\'estil.')"
                                           oninput="setCustomValidity('')">
                                </div>
                            </div>

                            <div class="hr-line-dashed"></div>

                            <div class="form-group row">
                                <label class="col-sm-2 col-form-label">Nom:</label>
                                <div class="col-sm-10">
                                    <input type="text"
                                           class="form-control"
                                           name="name"
                                           th:value="${style != null ? style.name : ''}"
                                           required
                                           oninvalid="this.setCustomValidity('Cal introduir el nom de l\'estil.')"
                                           oninput="setCustomValidity('')">
                                </div>
                            </div>

                            <div class="hr-line-dashed"></div>

                            <div class="form-group row">
                                <label class="col-sm-2 col-form-label">Ens Local:</label>
                                <div class="col-sm-10">
                                    <select class="form-control"
                                            name="ensLocal"
                                            required
                                            oninvalid="this.setCustomValidity('Cal seleccionar un Ens Local.')"
                                            oninput="setCustomValidity('')">
                                        <option value="">-- Selecciona un ens local --</option>
                                        <option th:if="${style != null && style.ensLocal != null}"
                                                th:value="${style.ensLocal.id}"
                                                th:text="${style.ensLocal.nom}"
                                                selected></option>
                                    </select>
                                </div>
                            </div>

                            <div class="hr-line-dashed"></div>

                            <div class="form-group row">
                                <label class="col-sm-2 col-form-label">Regles:</label>
                                <div class="col-sm-10">
                                    <textarea class="form-control"
                                              name="rules"
                                              rows="10"
                                              th:text="${style != null ? style.rules : ''}"
                                    ></textarea>
                                </div>
                            </div>

                            <div class="hr-line-dashed"></div>

                            <div class="form-group row">
                                <div class="col-sm-4 col-sm-offset-2">
                                    <a th:href="@{/template/styles}" class="btn btn-white btn-sm">
                                        <i class="fa fa-ban"></i> Cancel·lar
                                    </a>
                                    <button class="btn btn-primary btn-sm" type="submit">
                                        <i class="fa fa-save"></i> Desar
                                    </button>
                                </div>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<div th:fragment="footer(txt)">
    <footer th:text="${txt}"></footer>
</div>

</body>
</html>
