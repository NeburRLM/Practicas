<!DOCTYPE HTML>
<html xmlns:th="http://www.thymeleaf.org" xmlns:psd="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="UTF-8"/>
</head>
<body>

<div class="container-fluid px-4" style="max-width: 100%;">
    <div th:fragment="header(titol)">
        <div class="list-header">
            <div class="text-right mb-3">
                <a th:href="@{/templates/create}" class="btn btn-success" title="Crear plantilla">
                    <i class="fa fa-plus-circle"></i>
                    Nova plantilla
                </a>
                <!-- Button trigger modal -->
                <button type="button" class="btn btn-success" data-toggle="modal" data-target="#exampleModal">
                    <i class="fa fa-arrow-up"></i>
                    Importar plantilla
                </button>

                <!-- Modal -->
                <div class="modal fade" id="exampleModal" tabindex="-1" aria-labelledby="exampleModalLabel"
                     aria-hidden="true">
                    <div class="modal-dialog modal-dialog-centered modal-dialog-scrollable modal-lg modal-fullscreen-sm-down">
                    <div class="modal-content">
                            <div class="modal-header">
                                <h1 class="modal-title fs-5" id="exampleModalLabel">Importar plantilla</h1>
                                <button type="button" class="close" data-dismiss="modal" aria-label="Close">
                                    <span aria-hidden="true">&times;</span>
                                </button>
                            </div>

                            <!-- Formulario para subir archivo -->

                        <div class="modal-body bg-light">
                            <div class="text-center mb-4">
                                <div class="d-inline-flex align-items-center justify-content-center bg-primary text-white rounded-circle"
                                     style="width:60px; height:60px;">
                                    <i class="fa fa-upload fa-2x"></i>
                                </div>
                                <h5 class="mt-3 mb-1 text-dark font-weight-bold">Importar plantilla</h5>
                                <p class="text-muted mb-0">Selecciona un arxiu desde el teu ordinador per importar una plantilla.</p>
                                <small class="text-muted">Formats admesos: .json</small>
                            </div>

                            <div class="form-group mt-4">
                                <label for="fileInput" class="font-weight-bold text-secondary">
                                    <i class="fa fa-file mr-1 text-primary"></i> Arxiu
                                </label>
                                <div class="custom-file">
                                    <input type="file"
                                           id="fileInput"
                                           name="file"
                                           class="custom-file-input"
                                           accept=".json"
                                           required
                                           oninvalid="this.setCustomValidity('Cal especificar el fitxer que conté la plantilla.')"
                                           oninput="setCustomValidity('')">
                                    <label class="custom-file-label" for="fileInput" style="text-align: left;">Tria un arxiu...</label>
                                </div>
                            </div>
                        </div>

                        <div class="modal-footer bg-white border-0">
                            <button type="button" class="btn btn-light border" data-dismiss="modal">
                                <i class="fa fa-ban mr-1"></i> Cancel·lar
                            </button>
                            <button type="button" class="btn btn-primary shadow-sm" onclick="importTemplate()">
                                <i class="fa fa-upload mr-1"></i> Importar
                            </button>
                        </div>


                    </div>
                    </div>
                </div>

                <!-- Modal Assignar Valors -->
                <div class="modal fade" id="assignValorsModal" tabindex="-1" role="dialog"
                     aria-labelledby="assignValorsLabel" aria-hidden="true">
                    <div class="modal-dialog modal-lg modal-dialog-centered modal-dialog-scrollable">
                        <div class="modal-content">
                            <div class="modal-header">
                                <h4 class="modal-title" id="assignValorsLabel">
                                    <i class="fa fa-edit text-primary"></i> Assignar valors
                                </h4>
                                <button type="button" class="close" data-dismiss="modal" aria-label="Tancar">
                                    <span aria-hidden="true">&times;</span>
                                </button>
                            </div>

                            <div class="modal-body bg-light">
                                <div class="table-responsive">
                                    <table class="table table-hover table-sm">
                                        <thead class="bg-white border-bottom">
                                        <tr>
                                            <th class="text-left">Nom</th>
                                            <th class="text-center pl-5">Tipus</th>
                                            <th style="width: 55%;">Valor</th>
                                        </tr>
                                        </thead>
                                        <tbody id="variablesTableBody">
                                        <!-- Las variables se cargarán aquí -->
                                        </tbody>
                                    </table>
                                </div>

                                <div class="mt-4 pt-3 border-top">
                                    <div class="form-group">

                                        <div class="d-flex align-items-center">
                                            <div class="custom-file flex-grow-1">
                                                <input type="file" id="fileInputValors" class="custom-file-input"
                                                       accept=".json" onchange="updateFileLabel(this)">
                                                <label class="custom-file-label" for="fileInputValors" style="text-align: left;">Tria un arxiu...</label>
                                            </div>
                                            <button type="button" class="btn btn-primary shadow-sm ml-4"
                                                    onclick="importValors()"
                                                    style="white-space: nowrap;">
                                                <i class="fa fa-upload mr-1"></i>Importar valors
                                            </button>
                                        </div>
                                    </div>
                                </div>
                            </div>

                            <div class="modal-footer bg-white border-0">
                                <button type="button" class="btn btn-light border" data-dismiss="modal">
                                    <i class="fa fa-ban mr-1"></i>Cancel·lar
                                </button>
                                <button type="button" class="btn btn-success shadow-sm" onclick="generateProva()">
                                    <i class="fa fa-play mr-1"></i>Generar prova
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="ibox-content" id="app" th:fragment="list(page)">
        <form th:action="@{/templates}" method="get" id="filterForm">
            <!-- Mantener parámetros de paginación -->
            <input type="hidden" name="page" th:value="${param.page}"/>
            <input type="hidden" name="size" th:value="${param.size}"/>


            <div class="table-responsive">
                <table class="table table-striped table-bordered table-hover table-sm table-sort align-middle">

                    <thead>
                    <tr>
                        <th psd:table-sort="code">
                            <div class="text-center">Codi</div>
                            <input type="text" name="searchCode" th:value="${searchCode}"
                                   class="form-control form-control-sm"
                                   placeholder="Filtrar per codi..."
                                   style="font-size: 0.9em;"
                                   onchange="document.getElementById('filterForm').submit()">
                        </th>
                        <th psd:table-sort="name">
                            <div class="text-center">Nom</div>
                            <input type="text" name="searchName" th:value="${searchName}"
                                   class="form-control form-control-sm"
                                   placeholder="Filtrar per nom..."
                                   style="font-size: 0.9em;"
                                   onchange="document.getElementById('filterForm').submit()">
                        </th>
                        <th psd:table-sort="creatorUnit">
                            <div class="text-center">Unitat Creadora</div>
                            <input type="text" name="searchUnit" th:value="${searchUnit}"
                                   class="form-control form-control-sm"
                                   placeholder="Filtrar per unitat..."
                                   style="font-size: 0.9em;"
                                   onchange="document.getElementById('filterForm').submit()">
                        </th>
                        <th psd:table-sort="creatorUser">
                            <div class="text-center">Usuari Creador</div>
                            <input type="text" name="searchUser" th:value="${searchUser}"
                                   class="form-control form-control-sm"
                                   placeholder="Filtrar per usuari..."
                                   style="font-size: 0.9em;"
                                   onchange="document.getElementById('filterForm').submit()">
                        </th>
                        <th psd:table-sort="lastUpdated" class="text-center">Data Modificat</th>
                        <th class="text-center">Accions</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="taulademo : ${page.content}">
                        <td th:text="${taulademo.code}"/>
                        <td th:text="${taulademo.name}"/>
                        <td th:text="${taulademo.creatorUnit}"/>
                        <td th:text="${taulademo.creatorUser}"/>
                        <td th:text="${taulademo.lastUpdated}"/>
                        <td class="text-center">
                            <div class="d-flex justify-content-center gap-1">
                                <a th:href="@{/templates/edit/{id}(id=${taulademo.id})}"
                                   class="btn btn-success btn-sm mr-1"
                                   title="Editar">
                                    <i class="fa fa-pencil"></i>
                                </a>
                                <a th:href="@{/templates/show/{id}(id=${taulademo.id})}"
                                   class="btn btn-secondary btn-sm mr-1"
                                   title="Veure">
                                    <i class="fa fa-eye"></i>
                                </a>
                                <button type="button"
                                        class="btn btn-primary btn-sm mr-1 export-btn"
                                        title="Exportar"
                                        onclick="handleExportClick(this)"
                                        th:attr="data-id=${taulademo.id}, data-code=${taulademo.code}">
                                    <i class="fa fa-arrow-down"></i>
                                </button>
                                <button type="button"
                                        class="btn btn-danger btn-sm mr-1"
                                        title="Eliminar"
                                        th:onclick="'deleteTemplate(' + ${taulademo.id} + ')'">
                                    <i class="fa fa-trash"></i>
                                </button>
                            </div>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </form>
        <th:block
                th:insert="~{dipta-layouts/main/pagination :: links( page = ${page}, pageNumbers = ${pageNumbers} ) }"></th:block>

        <script>
            document.addEventListener("DOMContentLoaded", () => {

                document.querySelectorAll("th input").forEach(input => {
                    input.addEventListener("click", e => e.stopPropagation());
                    input.addEventListener("focus", e => e.stopPropagation());
                });
                window.addEventListener('pageshow', function(event) {
                    if (event.persisted) {
                        // La página se cargó desde el caché del navegador
                        window.location.reload();
                    }
                });
            });
            // noinspection JSUnusedGlobalSymbols
           async function deleteTemplate(id) {
                if (confirm('Estàs segur que vols eliminar aquest element?')) {
                    try {
                        const response = await fetch('/plantilles-web/templates/delete/' + id, {
                            method: 'POST',
                            headers: {
                                'Content-Type': 'application/json'
                            }
                        });
                        if (response.ok) {
                            alert('Èxit! Plantilla eliminada correctament.');
                            window.location.href = '/plantilles-web/templates';
                        } else {
                            const errorText = await response.text();
                            alert('Error: ' + errorText);
                        }
                    } catch (error) {
                        alert('Error: No ha sigut possible eliminar la plantilla');
                    }

                }
            }

            document.addEventListener('DOMContentLoaded', function () {
                const fileInput = document.getElementById('fileInput');
                if (fileInput) {
                    fileInput.addEventListener('change', function () {
                        const fileName = this.files[0]?.name || 'Tria un arxiu...';
                        this.nextElementSibling.textContent = fileName;
                    });
                }
            });

            function handleExportClick(btn) {
                const id = btn.getAttribute('data-id');
                const code = btn.getAttribute('data-code');
                exportTemplate(id, code);
            }

            function importTemplate() {
                const fileInput = document.getElementById('fileInput');
                const file = fileInput.files[0];

                if (!file) {
                    alert('Por favor, selecciona un archivo JSON');
                    return;
                }

                const reader = new FileReader();
                reader.onload = function(e) {
                    try {
                        const templateData = JSON.parse(e.target.result);

                        // CAMBIO: Usar formulario en lugar de fetch
                        const form = document.createElement('form');
                        form.method = 'POST';
                        form.action = '/plantilles-web/templates/import';
                        form.style.display = 'none';

                        // Añadir el JSON como campo oculto
                        const input = document.createElement('input');
                        input.type = 'hidden';
                        input.name = 'templateDTO';
                        input.value = JSON.stringify(templateData);
                        form.appendChild(input);

                        document.body.appendChild(form);
                        form.submit();

                    } catch (error) {
                        alert('El archivo no contiene un JSON válido');
                    }
                };
                reader.readAsText(file);
            }

            function exportTemplate(id, code) {

                fetch('/plantilles-web/templates/export/' + id)
                    .then(response => {
                        if (!response.ok) throw new Error('Error al exportar');
                        return response.text();
                    })
                    .then(text => {
                        const json = JSON.parse(text);
                        const content = json.item || json;

                        const blob = new Blob([JSON.stringify(content, null, 2)], {
                            type: 'application/json'
                        });

                        const url = URL.createObjectURL(blob);
                        const a = document.createElement('a');
                        a.href = url;
                        a.download = code + '.json';
                        a.click();
                        URL.revokeObjectURL(url);
                    })
                    .catch(err => {
                        alert('Error exportant la plantilla: ' + err.message);
                    });
            }

            function getDefaultValueForType(typeCode) {
                const defaultValues = {
                    0: '0',        // short
                    1: '0',        // int
                    2: '0',        // long
                    3: '0.0',      // float
                    4: '0.0',      // double
                    5: 'a',        // char
                    6: 'true',     // boolean
                    7: 'text de prova', // String
                    8: '[]',       // List
                    9: '[:]',       // Map
                    10: '2018-01-01T12:56:42+0200', // Data
                    11: '<p>html de prova</p>', // Html
                    12: '<table><tr><td>csv/html de prova</td></tr></table>' // csv_html
                };
                return defaultValues[typeCode] || '';
            }

            function openAssignValorsModal(btn) {
                const templateId = btn.getAttribute('data-id');

                fetch('/plantilles-web/templates/get/' + templateId)
                    .then(response => response.json())
                    .then(data => {
                        if (data.item) {
                            const template = data.item;
                            const variables = template.variables || [];

                            document.getElementById('assignValorsModal').dataset.template = JSON.stringify(template);
                            document.getElementById('assignValorsModal').dataset.templateId = templateId;

                            const tbody = document.getElementById('variablesTableBody');
                            tbody.innerHTML = '';

                            if (variables.length === 0) {
                                tbody.innerHTML = `
                        <tr>
                            <td colspan="3" class="text-center text-muted py-4">
                                <i class="fa fa-inbox mr-2"></i>
                                No hi ha variables definides
                            </td>
                        </tr>
                    `;
                            } else {
                                variables.forEach((variable) => {
                                    const row = document.createElement('tr');
                                    const typeLabel = getVariableType(variable.type);
                                    const defaultValue = getDefaultValueForType(variable.type);
                                    row.innerHTML = `
                                        <td class="align-middle text-left">
                                            <div class="text-truncate font-weight-bold text-dark"
                                                 style="max-width: 300px;"
                                                 title="${variable.name || 'Sin nombre'}">
                                                ${variable.name || 'Sin nombre'}
                                            </div>
                                        </td>

                                        <td class="align-middle text-center pl-5">
                                            <span class="badge badge-secondary px-3 py-2">${typeLabel}</span>
                                        </td>

                                        <td class="text-right">
                                            <input type="text"
                                               class="form-control form-control-sm variable-input shadow-sm d-inline-block"
                                               style="max-width: 150px;"
                                               data-variable-id="${variable.id}"
                                               data-variable-name="${variable.name}"
                                               data-variable-type="${variable.type}"
                                               value="${defaultValue}"
                                               placeholder="Introdueix el valor"
                                               autocomplete="off">
                                        </td>
                                    `;

                                    tbody.appendChild(row);
                                });
                            }

                            $('#assignValorsModal').modal('show');
                        } else {
                            alert('Error carregant les variables: estructura de resposta inválida');
                        }
                    })
                    .catch(error => {
                        console.error('Error:', error);
                        alert('Error carregant les variables: ' + error.message);
                    });
            }

            function getVariableType(typeCode) {
                const typeMap = {
                    0: 'short',
                    1: 'int',
                    2: 'long',
                    3: 'float',
                    4: 'double',
                    5: 'char',
                    6: 'boolean',
                    7: 'String',
                    8: 'List',
                    9: 'Map',
                    10: 'Data',
                    11: 'Html',
                    12: 'csv_html'
                };
                return typeMap[typeCode] || 'Unknown';
            }

            function updateFileLabel(input) {
                const fileName = input.files[0]?.name || 'Tria un arxiu...';
                input.nextElementSibling.textContent = fileName;
            }

            function importValors() {
                const fileInput = document.getElementById('fileInputValors');
                const file = fileInput.files[0];

                if (!file) {
                    alert('Cal especificar el fitxer que conté els valors');
                    return;
                }

                const reader = new FileReader();
                reader.onload = function(e) {
                    try {
                        const jsonData = JSON.parse(e.target.result);
                        const valorsData = jsonData.items || jsonData; // Acceder a items si existe

                        // Buscar por nombre de variable
                        Object.keys(valorsData).forEach(variableName => {
                            const input = document.querySelector(`input[data-variable-name="${variableName}"]`);
                            if (input) {
                                input.value = valorsData[variableName];
                                console.log(`Asignado valor ${valorsData[variableName]} a variable ${variableName}`);
                            } else {
                                console.log(`No se encontró input para variable ${variableName}`);
                            }
                        });

                        alert('Valors importats correctament');
                    } catch (error) {
                        console.error('Error parsing JSON:', error);
                        alert('El archivo no contiene un JSON válid');
                    }
                };
                reader.readAsText(file);
            }

            function generateProva() {
                const modal = document.getElementById('assignValorsModal');
                const templateId = modal.dataset.templateId;
                let template = JSON.parse(modal.dataset.template);

                // Actualizar solo los values de las variables
                document.querySelectorAll('.variable-input').forEach(input => {
                    const variableId = input.getAttribute('data-variable-id');
                    const value = input.value.trim();

                    if (!value) {
                        input.classList.add('is-invalid');
                        return;
                    }

                    input.classList.remove('is-invalid');
                    // Buscar y actualizar el value en la variable correspondiente
                    const variable = template.variables.find(v => v.id == variableId);
                    if (variable) {
                        variable.value = value; // Solo modificamos este campo
                    }
                });

                // Validar que no haya campos vacíos
                if (document.querySelectorAll('.variable-input.is-invalid').length > 0) {
                    alert('Cal omplir tots els valors de les variables abans de generar la prova.');
                    return;
                }

                // Enviar template completo (como en createTemplate.html)
                fetch('/plantilles-web/templates/show/' + templateId, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(template)
                })
                    .then(response => response.text())
                    .then(html => {
                        document.documentElement.innerHTML = html;
                        window.history.pushState({}, '', '/plantilles-web/templates/show/' + templateId);
                    })
                    .catch(error => {
                        console.error('Error:', error);
                        alert('Error generant la prova');
                    });
            }
        </script>

    </div>

    <footer>
        <th:block th:insert="~{dipta-layouts/main/pagination :: resum( page = ${page} ) }"></th:block>
    </footer>
</div>
</body>
</html>
