<!DOCTYPE html>

<html xmlns="http://www.w3.org/1999/xhtml" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" xmlns:th="http://www.thymeleaf.org"
      layout:decorate="~{dipta-layouts/main(appName='MA3 - The Future', appAbbr='MA3', pageTitle=${title})}">

<header th:insert="taula/fragments/styles.html :: header(titol=${title}) "></header>

<body>

<div layout:fragment="content">
    <header th:insert="taula/fragments/attachments.html :: header(titol=${title}) "></header>
    <div th:replace="taula/fragments/attachments.html :: list(page=${page}, url = ${pageUrl}) "></div>
    <div th:replace="taula/fragments/attachments.html :: footer(txt=${totalText}) "></div>
</div>

</body>

</html>
