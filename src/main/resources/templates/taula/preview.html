<html xmlns="http://www.w3.org/1999/xhtml" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" xmlns:th="http://www.thymeleaf.org"
      layout:decorate="~{dipta-layouts/main(
                            appName='MA3 - The Future',
                            appAbbr='MA3',
                            pageTitle=${title ?: 'Vista previa plantilla'},
                            )}">

<body>

<div layout:fragment="content">
    <header th:insert="~{taula/fragments/preview.html :: header(titol=${title})}"></header>
    <div th:replace="~{taula/fragments/preview.html :: list(page=${page}, url = ${pageUrl})}"></div>
    <div th:replace="~{taula/fragments/preview.html :: footer(txt=${totalText})}"></div>
</div>

</body>
</html>
